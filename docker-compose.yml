services:
  nginx:
    container_name: ${COMPOSE_NAME}-nginx
    image: nginx:alpine
    restart: unless-stopped
    profiles: ["server-stack"]
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template
    environment:
      - BASE_URL=${BASE_URL}
      - SERVER_NAME=${SERVER_NAME}
      - COMPOSE_NAME=${COMPOSE_NAME}
    networks:
      - network

  db:
    container_name: ${COMPOSE_NAME}-db
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    profiles: ["db-stack"]
    ports:
      # Bind to loopback only — the app reaches Postgres over the internal
      # compose network (DB_HOST=db), so the host publish is just for local
      # psql. Binding 0.0.0.0 would expose the DB to the whole network/ZeroTier.
      - "127.0.0.1:${DB_PORT_EXTERNAL}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - network

  rust:
    container_name: ${COMPOSE_NAME}-rust
    build: ./rust
    restart: unless-stopped
    profiles: ["server-stack"]
    command: ["cargo", "watch", "-x", "run --bin backend"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./rust:/app
    environment:
      - BASE_URL=${BASE_URL}
      # CORS — comma-separated exact origins; CORS_ALLOW_LOCAL keeps localhost/LAN
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - CORS_ALLOW_LOCAL=${CORS_ALLOW_LOCAL:-true}
      # DEBUG
      - RUST_LOG=${RUST_LOG}
      # Database
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
      # boot-time schema-drift verifier (db_init stays as-is).
      - DB_VERIFY_SCHEMA=${DB_VERIFY_SCHEMA:-0}
      # Registration (set to true to enable user signups)
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-false}
      # Canonical site URL (also used as the OTP / 2FA issuer label)
      - SITE_URL=${SITE_URL}
      # Telemetry → external ingest gateway. Empty = disabled (no-op, no deps).
      - TELEMETRY_INGEST_URL=${TELEMETRY_INGEST_URL:-}
      - TELEMETRY_API_KEY=${TELEMETRY_API_KEY:-}
      # Web Push (VAPID) key material lives in rust/src/keys/ (file-based), not env.
      # S3 object storage config lives in the DB (Services dashboard), not here.
    networks:
      - network

  notification-worker:
    container_name: ${COMPOSE_NAME}-notification-worker
    build: ./rust
    restart: unless-stopped
    profiles: ["server-stack"]
    command: ["cargo", "watch", "-x", "run --bin notification-worker"]
    volumes:
      - ./rust:/app
    environment:
      - RUST_LOG=${RUST_LOG}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
      # Web Push (VAPID) key material lives in rust/src/keys/ (file-based), not env.
    networks:
      - network

  cron-worker:
    container_name: ${COMPOSE_NAME}-cron-worker
    build: ./rust
    restart: unless-stopped
    profiles: ["server-stack"]
    command: ["cargo", "watch", "-x", "run --bin cron-worker"]
    # Reach host-run local LLM providers (Ollama / LM Studio) the same way the
    # backend does — the provider adapter rewrites localhost → host gateway.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./rust:/app
    environment:
      - RUST_LOG=${RUST_LOG}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
      # Email (send_email tool) now lives in the DB — Services → Email.
      # Web Push (VAPID) key material lives in rust/src/keys/ (file-based), not env.
    networks:
      - network

  embedding-worker:
    container_name: ${COMPOSE_NAME}-embedding-worker
    build: ./rust
    restart: unless-stopped
    profiles: ["server-stack"]
    command: ["cargo", "watch", "-x", "run --bin embedding-worker"]
    volumes:
      - ./rust:/app
    environment:
      - RUST_LOG=${RUST_LOG}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
    networks:
      - network

  # Single, health-gated connector (copied from the bodhistreams stack). The
  # image (see ./cloudflared) is just the cloudflared binary on Alpine plus an
  # in-process supervisor: it polls the full public chain (nginx -> rust) and,
  # on sustained failure, drains cloudflared so it deregisters from the
  # Cloudflare edge — then reconnects on recovery. No Docker socket, single
  # process tree. Outbound-only (no inbound ports). This is the ONLY public
  # ingress: traffic goes Cloudflare edge -> tunnel -> local nginx directly,
  # with no external reverse proxy in between.
  cloudflared:
    container_name: ${COMPOSE_NAME}-cloudflared
    build:
      context: ./cloudflared
    image: ${COMPOSE_NAME}-cloudflared
    restart: unless-stopped
    profiles: ["tunnel"]
    # host networking so BOTH the tunnel and its health probe reach nginx the
    # same way (the Cloudflare-dashboard origin points at this host's nginx port)
    network_mode: host
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TOKEN}
      # Full public chain via the host's published nginx port (matches nginx's
      # own ${NGINX_PORT}:80 publish). Override in .env if your path differs.
      - CLOUDFLARED_HEALTH_URL=http://localhost:${NGINX_PORT}/api/v1/health
      # Asymmetric hysteresis: drop FAST (never keep the tunnel up over a dead
      # backend), re-add SLOW (only after the server is provably stable, so a
      # flapping/recovering backend doesn't yo-yo the edge). At POLL=2s this is
      # ~2s to drain on the first failed probe, ~6s of clean probes to reconnect.
      - FAIL_THRESHOLD=1
      - OK_THRESHOLD=3
      - POLL_INTERVAL=2

networks:
  network:
    driver: bridge