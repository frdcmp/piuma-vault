services:
  nginx:
    container_name: ${COMPOSE_NAME}-nginx
    image: nginx:alpine
    restart: unless-stopped
    profiles: ["server-stack"]
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template
    environment:
      - BASE_URL=${BASE_URL}
      - SERVER_NAME=${SERVER_NAME}
      - COMPOSE_NAME=${COMPOSE_NAME}
    networks:
      - network

  db:
    container_name: ${COMPOSE_NAME}-db
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    profiles: ["db-stack"]
    ports:
      - "${DB_PORT_EXTERNAL}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - network

  rust:
    container_name: ${COMPOSE_NAME}-rust
    build: ./rust
    restart: unless-stopped
    profiles: ["server-stack"]
    command: ["cargo", "watch", "-x", "run --bin backend"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./rust:/app
    environment:
      - BASE_URL=${BASE_URL}
      # CORS — comma-separated exact origins; CORS_ALLOW_LOCAL keeps localhost/LAN
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - CORS_ALLOW_LOCAL=${CORS_ALLOW_LOCAL:-true}
      # DEBUG
      - RUST_LOG=${RUST_LOG}
      # Database
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
      # Email
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      # Registration
      - ALLOW_REGISTRATION=false
      # Canonical site URL (also used as the OTP / 2FA issuer label)
      - SITE_URL=${SITE_URL:-https://vault.example.com}
      # JWT keys — set one of:
      #   JWT_PRIVATE_KEY_PEM / JWT_PUBLIC_KEY_PEM (raw multi-line PEM)
      #   JWT_PRIVATE_KEY_PATH / JWT_PUBLIC_KEY_PATH (PEM file path inside container)
      # If neither is set the dev keys at /app/src/keys/ are used as a fallback.
      - JWT_PRIVATE_KEY_PATH=${JWT_PRIVATE_KEY_PATH:-}
      - JWT_PUBLIC_KEY_PATH=${JWT_PUBLIC_KEY_PATH:-}
      # S3 object storage config lives in the DB (Services dashboard), not here.
    networks:
      - network

  embedding-worker:
    container_name: ${COMPOSE_NAME}-embedding-worker
    build: ./rust
    restart: unless-stopped
    profiles: ["server-stack"]
    command: ["cargo", "watch", "-x", "run --bin embedding-worker"]
    volumes:
      - ./rust:/app
    environment:
      - RUST_LOG=${RUST_LOG}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
    networks:
      - network

networks:
  network:
    driver: bridge